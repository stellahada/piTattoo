<div class="login-page">
    <div class="adm">
      <div class="logo">
        <h1 class="titulo">Adm Login</h1>
        <img src="./assets/images/borboleta.png" alt="Logo">
      </div>
  
      <div class="login">
        <form class="form" (ngSubmit)="logar()">
          <div class="inputs">
            <label for="email">Email:</label>
            <input type="text" id="email" [(ngModel)]="email" name="email" required>
  
            <label for="senha">Senha:</label>
            <input type="password" id="senha" [(ngModel)]="senha" name="senha" required>
          </div>
  
          <div class="botao">
            <button type="submit">Login</button>
          </div>
        </form>
      </div>
    </div>
  </div>
